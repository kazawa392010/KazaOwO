<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều Khiển Phun Sương</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>BẢNG ĐIỀU KHIỂN ESP32</h2>
            
            <div class="info-row">
                <span>Trạng thái:</span>
                <b id="status-network">Đang kiểm tra...</b>
            </div>
            
            <div class="info-row">
                <span>IP Thiết bị:</span>
                <span id="ipnetwork">0.0.0.0</span>
            </div>

            <div class="control-section">
                <p>Mạch Phun Sương: <strong id="status-mach">Đang Tắt</strong></p>
                <button id="on-off-mach" class="btn-toggle">Bật / Tắt</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
